name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run prepublishOnly

      - name: Obtain npm OIDC token
        run: |
          OIDC=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" | jq -r '.value')
          echo "OIDC token obtained (length=${#OIDC})"
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $OIDC" \
            -H "Content-Type: application/json" \
            https://registry.npmjs.org/-/npm/v1/tokens/grantGranularToken)
          HTTP=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -1)
          echo "npm exchange HTTP status: $HTTP"
          if [ "$HTTP" = "200" ]; then
            TOKEN=$(echo "$BODY" | jq -r '.token')
            echo "::add-mask::$TOKEN"
            echo "NPM_TOKEN=$TOKEN" >> $GITHUB_ENV
          else
            echo "Exchange failed: $BODY"
            exit 1
          fi

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: bunx changeset publish
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
